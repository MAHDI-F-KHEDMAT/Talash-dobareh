name: VLESS Config Cleaner and Checker

on:
  schedule:
    - cron: '0 */6 * * *' # اجرای خودکار هر ۶ ساعت یک‌بار
  workflow_dispatch: # امکان اجرای دستی ورکفلو

jobs:
  check-and-clean:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "requests[socks]" # نصب پکیج با قابلیت پشتیبانی از پروکسی SOCKS5

    - name: Install Xray Core
      run: |
        XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
        echo "Installing Xray Core $XRAY_VERSION"
        curl -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
        unzip -q xray.zip -d xray_bin
        sudo mv xray_bin/xray /usr/local/bin/xray
        sudo chmod +x /usr/local/bin/xray
        rm -rf xray.zip xray_bin
        xray -version

    - name: Run Cleaner Script
      run: python cleaner.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add results.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update working VLESS configs" && git push)
