name: VLESS Configs Refiner and Tester

on:
  schedule:
    - cron: '0 */6 * * *' # اجرای خودکار هر ۶ ساعت یک‌بار
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      PYTHONUNBUFFERED: 1 # غیرفعال کردن بافر خروجی پایتون جهت چاپ آنی لاگ‌ها

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Install Xray Core (Direct Binary)
      run: |
        echo "Downloading official Xray-core binary..."
        curl -L "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip" -o xray.zip
        
        echo "Extracting Xray..."
        unzip -o xray.zip xray
        
        echo "Moving Xray to PATH..."
        sudo mv xray /usr/local/bin/
        sudo chmod +x /usr/local/bin/xray
        
        echo "Verifying installation:"
        xray -version

    - name: Run Python Refiner Script
      run: |
        python cleaner.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add results.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update refined VLESS configs [Skip CI]" && git push)
